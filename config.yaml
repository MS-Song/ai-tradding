# KIS-Vibe-Trader Configuration
vibe_strategy:
  # 기본 익절 기준 (수익률 5%)
  take_profit_threshold: 5.0
  # 기본 손절 기준 (수익률 -3%)
  stop_loss_threshold: -3.0
  
  # 익절 시 매도 수량 비율 (30%)
  take_profit_ratio: 0.3
  # 손절 시 매도 수량 비율 (전량 100%)
  stop_loss_ratio: 1.0

  # 상승장(Bull Market) 특별 설정
  bull_market:
    take_profit_threshold: 3.0 # 방어적 포지션 취하기 위해 3%로 하향
    
  # 하락장(Bear Market) 특별 설정
  bear_market:
    # 물타기(추가 매수) 설정
    average_down_amount: 500000 # 50만원씩 매수
    target_stocks:
      - "005930" # 삼성전자
      - "000660" # SK하이닉스
