name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. 테스트 단계: 모든 로직 검증 및 리포트 생성
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Tests and Generate Report
        run: python scripts/generate_test_report.py
        
      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: docs/TEST_REPORT.md
          retention-days: 7

  # 2. 윈도우 빌드 단계
  build-windows:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller xhtml2pdf markdown2 reportlab pillow
          
      - name: Build Windows EXE
        run: scripts/build/windows/build.bat
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: target/
          retention-days: 3

  # 3. 리눅스 빌드 단계
  build-linux:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config python3-dev libjpeg-dev zlib1g-dev fonts-nanum
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller xhtml2pdf markdown2 reportlab pillow
          
      - name: Build Linux Binary
        run: |
          chmod +x scripts/build/linux/build.sh
          ./scripts/build/linux/build.sh
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: target/
          retention-days: 1

  # 4. 릴리스 생성 및 배포 단계
  create-release:
    needs: [build-windows, build-linux, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Set Release Version
        id: version
        run: |
          BASE_VER=$(cat VERSION)
          BUILD_NUM=${{ github.run_number }}
          FULL_VER="v${BASE_VER}.${BUILD_NUM}"
          echo "tag_name=${FULL_VER}" >> $GITHUB_OUTPUT
          echo "version=${FULL_VER}" >> $GITHUB_OUTPUT

      - name: Prepare Release Files
        run: |
          mkdir -p final-assets
          cp release-artifacts/windows-artifact/AI-Vibe-Trader.exe final-assets/AI-Vibe-Trader.exe
          cp release-artifacts/windows-artifact/USER_MANUAL.pdf final-assets/USER_MANUAL.pdf
          cp release-artifacts/windows-artifact/D2Coding.ttf final-assets/D2Coding.ttf
          cp release-artifacts/linux-artifact/AI-Vibe-Trader-Linux final-assets/AI-Vibe-Trader-Linux
          cp release-artifacts/test-report/TEST_REPORT.md final-assets/TEST_REPORT.md
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## AI-Vibe-Trader 자동 빌드 및 검증 완료 릴리즈
            - **버전**: ${{ steps.version.outputs.version }}
            - **빌드 시각**: ${{ github.event.head_commit.timestamp }}
            - **테스트 상태**: ✅ PASS (100% 검증 통과)
            
            ### 🛠️ 이번 릴리즈 주요 내용
            - 모의거래 자가 진단 체계(K 키 메뉴) 정식 탑재
            - 빌드 파이프라인 내 통합 테스트 자동 검증 로직 추가
            - 상세 테스트 결과는 첨부된 `TEST_REPORT.md` 참조
            
            ### 📂 첨부 파일 설명
            1. **AI-Vibe-Trader.exe**: 윈도우용 실행 파일
            2. **AI-Vibe-Trader-Linux**: 리눅스용 실행 파일
            3. **TEST_REPORT.md**: 빌드 검증 상세 리포트 (통합 테스트 11종 성공)
            4. **USER_MANUAL.pdf**: PDF 사용자 매뉴얼
            5. **D2Coding.ttf**: 권장 폰트
          draft: false
          prerelease: false
          files: |
            final-assets/AI-Vibe-Trader.exe
            final-assets/AI-Vibe-Trader-Linux
            final-assets/USER_MANUAL.pdf
            final-assets/D2Coding.ttf
            final-assets/TEST_REPORT.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
